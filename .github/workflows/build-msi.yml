name: build-msi

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      extras:
        description: "pip extras to bundle in the MSI (default: llama,faiss,mcp)"
        default: "llama,faiss,mcp"
        required: false
        type: string

permissions:
  contents: read
  # Needed to create a GitHub Release and upload the .msi to it.
  actions: read

jobs:
  msi:
    name: Build Windows MSI
    # windows-2022 has Visual Studio 2022 preinstalled; the WiX toolset
    # needs .NET Framework 4.x which is also preinstalled.
    runs-on: windows-2022
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          # We use pip directly, no caching ÔÇö graphindex has many native
          # wheels (numpy, tree-sitter, rapidfuzz) and the cache key isn't
          # worth the complexity for a once-per-release job.

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install WiX Toolset 3.14
        run: choco install wixtoolset --version=3.14.0 --no-progress --limit-output

      - name: Verify WiX install
        shell: bash
        run: |
          wix_bin="C:\Program Files (x86)\WiX Toolset v3.14\bin"
          ls -la "$wix_bin" | head -5
          "$wix_bin\candle.exe" -?

      - name: Build the graphindex MSI
        shell: pwsh
        env:
          # Pin a stable temp encoding so the rich progress bar doesn't
          # blow up on cp1252 consoles (it prints ÔľŞ arrows etc.).
          PYTHONIOENCODING: utf-8
          # Quiet llama.cpp C logs during the staging pip install of the
          # LLM extras (if the wheel drags any in transitively).
          GRAPHINDEX_LLAMA_LOG: error
        run: |
          python -m installer.build_msi `
            --extras "${{ github.event.inputs.extras || 'llama,faiss,mcp' }}" `
            --output dist

      - name: Show produced MSI
        shell: pwsh
        run: |
          Get-ChildItem dist/*.msi | ForEach-Object {
            $mb = [math]::Round($_.Length / 1MB, 1)
            Write-Host "::notice::MSI: $($_.FullName)  ($mb MB)"
          }

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: graphindex-msi
          path: dist/*.msi
          # 500 MB cap; the MSI is ~250-400 MB depending on extras.
          retention-days: 30
          if-no-files-found: error

      # Create / update a GitHub Release on every push (branch or tag).
      #
      # Two modes:
      #   * Push of a `v*` tag Ôćĺ release is named after the tag
      #     (e.g. `v0.1.0`), marked as pre-release if it contains
      #     `-rc` / `-beta` / `-alpha`.
      #   * Any other push (main, PR base, manual) Ôćĺ release is named
      #     after the short commit SHA (e.g. `main-9a8b7c2`) and always
      #     marked as pre-release so end users don't accidentally grab
      #     an untagged CI build.
      #
      # `softprops/action-gh-release` updates an existing release if one
      # already exists for the same `tag_name`, so repeated pushes to
      # main overwrite the prior build's assets rather than spamming
      # the Releases page.
      - name: Generate release tag name
        id: tag
        shell: pwsh
        run: |
          if ('${{ github.ref }}' -like 'refs/tags/v*') {
            $tag = '${{ github.ref_name }}'
            $prerelease = '${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}' -eq 'true'
          } else {
            $tag = ('${{ github.ref_name }}' + '-' + '${{ github.sha }}'.Substring(0,7))
            $prerelease = 'true'
          }
          "tag=$tag"        | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "prerelease=$prerelease" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "::notice::Release tag: $tag  (prerelease=$prerelease)"

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: graphindex ${{ steps.tag.outputs.tag }}
          # Branch / PR / manual runs: prerelease so users don't grab CI
          # builds by accident. Tag runs: honour the rc/beta/alpha check.
          prerelease: ${{ steps.tag.outputs.prerelease }}
          fail_on_unmatched_files: true
          generate_release_notes: ${{ startsWith(github.ref, 'refs/tags/v') }}
          files: dist/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
